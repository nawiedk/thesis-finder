<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thema Bearbeiten</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <h1>Thema Bearbeiten</h1>
    <form th:action="@{/supervisor/saveChange}" method="post">
        <input type="hidden" th:value="${topic.id}" name="id">
        Name<input type="text" th:value="${topic.topic}" name="topic"> <br>
        Beschreibung<input type="text" th:value="${topic.description}" name="description">
        <button type="submit">Änderungen Speichern</button>
    </form>


</body>
</html>
