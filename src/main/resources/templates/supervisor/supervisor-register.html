<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Supervisor erstellen</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Neuen Supervisor anlegen</h1>

<form method="post" th:action="@{/supervisor/register}">

    <div class="form-group">
        <label for="title">Akademischer Titel</label>
        <select class="form-control" id="title" name="title">
            <option value="">(Kein Titel)</option>
            <option value="Dr.">Dr.</option>
            <option value="Prof.">Prof.</option>
            <option value="Prof. Dr.">Prof. Dr.</option>
        </select>
    </div>

    <div class="form-group">
        <label for="firstName">Vorname *</label>
        <input class="form-control" id="firstName" name="firstName" placeholder="z.B. Max" required type="text">
    </div>

    <div class="form-group">
        <label for="lastName">Nachname</label>
        <input class="form-control" id="lastName" name="lastName" placeholder="z.B. Mustermann" type="text">
    </div>

    <div class="form-group">
        <label for="email">E-Mail</label>
        <input class="form-control" id="email" name="email" placeholder="max@uni-duesseldorf.de" type="email">
    </div>

    <div class="form-group">
        <label for="office">Büro</label>
        <input class="form-control" id="office" name="office" placeholder="z.B. 25.12.01.23" type="text">
    </div>

    <div class="form-group">
        <label for="phone">Telefon</label>
        <input class="form-control" id="phone" name="phone" placeholder="z.B. +49 211 123456" type="tel">
    </div>

    <button class="btn btn-primary" type="submit">Supervisor erstellen</button>
</form>

</body>
</html>
