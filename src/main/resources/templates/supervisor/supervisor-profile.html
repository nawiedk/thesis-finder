<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Supervisor Profil</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card">
    <div class="card-header">
        <h1 th:if="${supervisor != null}" th:text="'Profil von ' + ${supervisor.fullName}">Profil von Max
            Mustermann</h1>
        <h1 th:unless="${supervisor != null}">Kein Profil gefunden</h1>
    </div>

    <div class="card-body">
        <div th:if="${supervisor != null}">

            <dl class="row">
                <dt class="col-sm-3">E-Mail</dt>
                <dd class="col-sm-9" th:text="${supervisor.email}">test@example.com</dd>

                <dt class="col-sm-3">Büro</dt>
                <dd class="col-sm-9" th:text="${supervisor.office}">Raum XY</dd>

                <dt class="col-sm-3">Telefon</dt>
                <dd class="col-sm-9" th:text="${supervisor.phone}">+49 123 456</dd>
            </dl>
        </div>

        <div class="alert alert-warning" role="alert" th:unless="${supervisor != null}">
            <p>Es konnten keine Supervisor-Daten geladen werden.</p>
        </div>

        <a class="btn btn-secondary mt-3" href="/supervisor/all">Zurück zur Übersicht</a>
    </div>
</div>

</body>
</html>
