<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SupervisorMenu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<h1>Betreuende Menü</h1>
<h2>Liste ihrer Themen:</h2>
<table>
    <thead>
    <tr>
        <td>Name</td>
        <td>Beschreibung</td>
    </tr>
    <tbody>
    <tr th:each="themen:${topics}">
        <td th:text="${themen.title}"></td>
        <td>
            <a th:href="@{/topic/edit/{supervisorId}/{topicId}(supervisorId=1,topicId=${themen.topicId()})}" class="btn-primary">Bearbeiten</a>
        </td><br>
    </tr>
    </tbody>
    </thead>
</table>

<a href="/topic/topicform" class="btn-primary">Thema erstellen</a>

<span th:if="${editSuccess}">Thema wurde erfolgreich bearbeitet.</span>

<span th:if="${erfolgreichErstellt}">Thema erfolgreich erstellt.</span>

<!--<form method="get" th:action="${/supervisor/{supervisorId}(supervisorId=1)">-->

<!--</form>-->


</body>

</html>
