<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Studenten-Registrierung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Registrierung für das Game of Advisors</h1>
<p>Bitte vervollständige dein Profil, um die Rolle <strong>Student</strong> zu erhalten.</p>

<form class="mt-4" method="post" th:action="@{/student/register}">

    <div class="form-group">
        <label for="firstName">Vorname:</label>
        <input class="form-control" id="firstName" name="firstName"
               placeholder="z.B. Max" required type="text">
    </div>

    <div class="form-group">
        <label for="lastName">Nachname:</label>
        <input class="form-control" id="lastName" name="lastName"
               placeholder="z.B. Mustermann" required type="text">
    </div>

    <button class="btn btn-primary" type="submit">Als Student registrieren</button>
</form>

</body>
</html>
